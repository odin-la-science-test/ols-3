<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Splash Animation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; }
        canvas { display: block; }
        #home {
            display: none;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e1a, #0d1117);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }
        #home.show { display: flex; }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        button {
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, #00f5ff, #00a8ff);
            color: #0a0e1a;
            border: none;
            border-radius: 0.75rem;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.3);
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 245, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="home">
        <h1 style="font-size: 3.5rem; font-weight: 900; background: linear-gradient(135deg, #00f5ff, #00a8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            ✨ Animation Premium
        </h1>
        <p style="font-size: 1.3rem; opacity: 0.8;">Cinématographique • Fluide • Élégante</p>
        <button onclick="location.reload()">🔄 Rejouer l'animation</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const home = document.getElementById('home');

        let phase = 'converging'; // converging → formed → loading → expanding → done
        const startTime = Date.now();

        // Resize canvas
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // Hexagone
        const hexRadius = Math.min(window.innerWidth, window.innerHeight) * 0.25;
        const hexPoints = [];
        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i - Math.PI / 2;
            hexPoints.push([
                Math.cos(angle) * hexRadius,
                Math.sin(angle) * hexRadius
            ]);
        }

        // Particules
        class Particle {
            constructor(startX, startY, targetX, targetY) {
                this.x = startX;
                this.y = startY;
                this.targetX = targetX;
                this.targetY = targetY;
                this.vx = 0;
                this.vy = 0;
                this.size = 2 + Math.random() * 2;
                this.opacity = 0;
                this.glow = 0;
            }

            update(time, index) {
                if (phase === 'converging') {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 1) {
                        this.vx += dx * 0.08;
                        this.vy += dy * 0.08;
                        this.vx *= 0.92;
                        this.vy *= 0.92;
                        this.x += this.vx;
                        this.y += this.vy;
                    } else {
                        this.x = this.targetX;
                        this.y = this.targetY;
                    }
                    
                    this.opacity = Math.min(1, this.opacity + 0.02);
                    this.glow = 0.3;
                    
                } else if (phase === 'formed' || phase === 'loading') {
                    this.x = this.targetX;
                    this.y = this.targetY;
                    
                    const waveOffset = Math.sin(time * 0.002 + index * 0.1) * 2;
                    const angle = Math.atan2(this.targetY, this.targetX);
                    this.x += Math.cos(angle) * waveOffset;
                    this.y += Math.sin(angle) * waveOffset;
                    
                    const pulseWave = Math.sin(time * 0.003 - index * 0.05);
                    this.glow = 0.5 + pulseWave * 0.5;
                    this.opacity = 0.8 + pulseWave * 0.2;
                    
                } else if (phase === 'expanding') {
                    const angle = Math.atan2(this.targetY, this.targetX);
                    this.x += Math.cos(angle) * 3;
                    this.y += Math.sin(angle) * 3;
                    this.opacity = Math.max(0, this.opacity - 0.03);
                    this.glow = Math.max(0, this.glow - 0.05);
                }
            }

            draw(centerX, centerY) {
                const x = centerX + this.x;
                const y = centerY + this.y;
                
                if (this.glow > 0) {
                    const gradient = ctx.createRadialGradient(x, y, 0, x, y, this.size * 4);
                    gradient.addColorStop(0, `rgba(0, 245, 255, ${this.opacity * this.glow * 0.6})`);
                    gradient.addColorStop(1, 'rgba(0, 245, 255, 0)');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(x - this.size * 4, y - this.size * 4, this.size * 8, this.size * 8);
                }
                
                ctx.fillStyle = `rgba(0, 245, 255, ${this.opacity})`;
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Créer particules
        const particles = [];
        const particlesPerSide = 20;
        
        for (let i = 0; i < 6; i++) {
            const p1 = hexPoints[i];
            const p2 = hexPoints[(i + 1) % 6];
            
            for (let j = 0; j < particlesPerSide; j++) {
                const t = j / particlesPerSide;
                const targetX = p1[0] + (p2[0] - p1[0]) * t;
                const targetY = p1[1] + (p2[1] - p1[1]) * t;
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 300 + Math.random() * 500;
                const startX = Math.cos(angle) * distance;
                const startY = Math.sin(angle) * distance;
                
                particles.push(new Particle(startX, startY, targetX, targetY));
            }
        }

        // Animation loop
        function animate() {
            const now = Date.now();
            const elapsed = now - startTime;

            // Gestion phases
            if (phase === 'converging' && elapsed > 2500) phase = 'formed';
            else if (phase === 'formed' && elapsed > 3500) phase = 'loading';
            else if (phase === 'loading' && elapsed > 6000) phase = 'expanding';
            else if (phase === 'expanding' && elapsed > 7000) {
                phase = 'done';
                canvas.style.display = 'none';
                home.classList.add('show');
                return;
            }

            // Background gradient
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#0a0e1a');
            gradient.addColorStop(1, '#0d1117');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // Update & draw particles
            particles.forEach((p, i) => {
                p.update(now, i);
                p.draw(centerX, centerY);
            });

            // Hexagone edges
            if (phase === 'formed' || phase === 'loading') {
                ctx.strokeStyle = `rgba(0, 245, 255, ${0.3 + Math.sin(now * 0.002) * 0.2})`;
                ctx.lineWidth = 2;
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(0, 245, 255, 0.5)';
                
                ctx.beginPath();
                hexPoints.forEach((point, i) => {
                    if (i === 0) ctx.moveTo(centerX + point[0], centerY + point[1]);
                    else ctx.lineTo(centerX + point[0], centerY + point[1]);
                });
                ctx.closePath();
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Logo O
            if (phase === 'formed' || phase === 'loading') {
                const scale = 1 + Math.sin(now * 0.002) * 0.02;
                const opacity = 0.9 + Math.sin(now * 0.003) * 0.1;
                
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.scale(scale, scale);
                ctx.font = 'bold 120px system-ui';
                ctx.fillStyle = `rgba(0, 245, 255, ${opacity})`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowBlur = 30;
                ctx.shadowColor = 'rgba(0, 245, 255, 0.8)';
                ctx.fillText('O', 0, 0);
                ctx.restore();
            }

            // Expansion effect
            if (phase === 'expanding') {
                const expandProgress = (elapsed - 6000) / 1000;
                const scale = 1 + expandProgress * 15;
                const opacity = Math.max(0, 1 - expandProgress);
                
                ctx.save();
                ctx.globalAlpha = opacity;
                ctx.translate(centerX, centerY);
                ctx.scale(scale, scale);
                ctx.translate(-centerX, -centerY);
                
                ctx.strokeStyle = `rgba(0, 245, 255, ${opacity * 0.5})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                hexPoints.forEach((point, i) => {
                    if (i === 0) ctx.moveTo(centerX + point[0], centerY + point[1]);
                    else ctx.lineTo(centerX + point[0], centerY + point[1]);
                });
                ctx.closePath();
                ctx.stroke();
                ctx.restore();
            }

            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Animation Simple</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0e1a;
        }
        canvas { display: block; }
        
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #00f5ff;
            font-size: 14px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="info">
        <div style="font-weight: 700; font-size: 16px; margin-bottom: 10px;">🎬 Test Animation</div>
        <div>Status: <span id="status">Chargement...</span></div>
        <div>Particules: <span id="particle-count">0</span></div>
        <div>FPS: <span id="fps">0</span></div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        console.log('🎬 Démarrage animation...');
        console.log('Three.js version:', THREE.REVISION);

        // Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0a0e1a);
        document.body.appendChild(renderer.domElement);

        console.log('✅ Renderer créé');
        document.getElementById('status').textContent = 'Renderer OK';

        // Créer hexagone
        const hexRadius = 4;
        const hexPoints = [];
        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i - Math.PI / 2;
            hexPoints.push(new THREE.Vector3(
                Math.cos(angle) * hexRadius,
                Math.sin(angle) * hexRadius,
                0
            ));
        }

        // Wireframe hexagone
        const hexGeometry = new THREE.BufferGeometry().setFromPoints([...hexPoints, hexPoints[0]]);
        const hexMaterial = new THREE.LineBasicMaterial({ color: 0x00f5ff, linewidth: 2 });
        const hexLine = new THREE.Line(hexGeometry, hexMaterial);
        scene.add(hexLine);

        console.log('✅ Hexagone créé');

        // Créer particules SIMPLES (sans shader)
        const particlesPerSide = 40;
        const particleCount = particlesPerSide * 6;
        const positions = new Float32Array(particleCount * 3);

        let idx = 0;
        for (let i = 0; i < 6; i++) {
            const p1 = hexPoints[i];
            const p2 = hexPoints[(i + 1) % 6];
            for (let j = 0; j < particlesPerSide; j++) {
                const t = j / particlesPerSide;
                const target = new THREE.Vector3().lerpVectors(p1, p2, t);
                
                positions[idx * 3] = target.x;
                positions[idx * 3 + 1] = target.y;
                positions[idx * 3 + 2] = target.z;
                idx++;
            }
        }

        const particleGeometry = new THREE.BufferGeometry();
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        const particleMaterial = new THREE.PointsMaterial({
            color: 0x00f5ff,
            size: 0.15,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);

        console.log('✅ Particules créées:', particleCount);
        document.getElementById('particle-count').textContent = particleCount;
        document.getElementById('status').textContent = 'Animation active';

        // Animation
        let lastTime = Date.now();
        let frameCount = 0;

        function animate() {
            const now = Date.now();
            
            // FPS counter
            frameCount++;
            if (now - lastTime > 1000) {
                const fps = frameCount;
                frameCount = 0;
                lastTime = now;
                document.getElementById('fps').textContent = fps;
            }

            // Rotation simple pour tester
            hexLine.rotation.z += 0.005;
            particles.rotation.z += 0.005;

            // Pulsation
            const scale = 1 + Math.sin(now * 0.001) * 0.1;
            hexLine.scale.set(scale, scale, 1);
            particles.scale.set(scale, scale, 1);

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();
        console.log('✅ Animation lancée');

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>

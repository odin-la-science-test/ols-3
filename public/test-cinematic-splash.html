<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Animation Cinématographique - Niveau Apple/Tesla</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            overflow: hidden; 
            font-family: system-ui, -apple-system, sans-serif;
            background: radial-gradient(ellipse at center, #0d1117 0%, #0a0e1a 100%);
        }
        canvas { display: block; }
        
        #info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: rgba(0, 245, 255, 0.8);
            font-size: 14px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }
        
        #home {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(ellipse at center, #0d1117 0%, #0a0e1a 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 2rem;
            opacity: 0;
            animation: fadeIn 1.5s ease-out forwards;
        }
        
        #home.show { display: flex; }
        
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        
        button {
            padding: 1rem 2.5rem;
            background: linear-gradient(135deg, #00f5ff, #00a8ff);
            color: #0a0e1a;
            border: none;
            border-radius: 0.75rem;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.3);
            transition: all 0.3s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 245, 255, 0.5);
        }
        
        .phase-indicator {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="info">
        <div style="font-weight: 700; font-size: 16px; margin-bottom: 10px;">🎬 Animation Cinématographique</div>
        <div>Phase: <span id="phase-name">Genesis</span></div>
        <div>Particules: <span id="particle-count">240</span></div>
        <div>FPS: <span id="fps">60</span></div>
        <div class="phase-indicator">
            Genesis → Converging → Formed → Loading → Expanding
        </div>
    </div>

    <div id="home">
        <h1 style="font-size: 3.5rem; font-weight: 900; background: linear-gradient(135deg, #00f5ff, #00a8ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
            ✨ Animation Terminée
        </h1>
        <p style="font-size: 1.3rem; opacity: 0.8;">Niveau Apple • Tesla • Premium</p>
        <button onclick="location.reload()">🔄 Rejouer l'animation</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Setup Three.js
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 15;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: 'high-performance' });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x0a0e1a, 1);
        document.body.appendChild(renderer.domElement);
        
        console.log('🎬 Animation démarrée !');
        console.log('Particules:', particleCount);
        console.log('WebGL:', renderer.capabilities.isWebGL2 ? 'WebGL2' : 'WebGL1');

        // Vertex Shader avec Simplex Noise
        const vertexShader = `
            uniform float uTime;
            uniform float uPhase;
            uniform float uProgress;
            
            attribute vec3 targetPos;
            attribute float particleIndex;
            
            varying float vAlpha;
            varying float vGlow;
            
            // Simplex 3D Noise
            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
            vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }
            
            float snoise(vec3 v) {
                const vec2 C = vec2(1.0/6.0, 1.0/3.0);
                const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
                vec3 i  = floor(v + dot(v, C.yyy));
                vec3 x0 = v - i + dot(i, C.xxx);
                vec3 g = step(x0.yzx, x0.xyz);
                vec3 l = 1.0 - g;
                vec3 i1 = min(g.xyz, l.zxy);
                vec3 i2 = max(g.xyz, l.zxy);
                vec3 x1 = x0 - i1 + C.xxx;
                vec3 x2 = x0 - i2 + C.yyy;
                vec3 x3 = x0 - D.yyy;
                i = mod289(i);
                vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0)) + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
                float n_ = 0.142857142857;
                vec3 ns = n_ * D.wyz - D.xzx;
                vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
                vec4 x_ = floor(j * ns.z);
                vec4 y_ = floor(j - 7.0 * x_);
                vec4 x = x_ *ns.x + ns.yyyy;
                vec4 y = y_ *ns.x + ns.yyyy;
                vec4 h = 1.0 - abs(x) - abs(y);
                vec4 b0 = vec4(x.xy, y.xy);
                vec4 b1 = vec4(x.zw, y.zw);
                vec4 s0 = floor(b0)*2.0 + 1.0;
                vec4 s1 = floor(b1)*2.0 + 1.0;
                vec4 sh = -step(h, vec4(0.0));
                vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
                vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
                vec3 p0 = vec3(a0.xy, h.x);
                vec3 p1 = vec3(a0.zw, h.y);
                vec3 p2 = vec3(a1.xy, h.z);
                vec3 p3 = vec3(a1.zw, h.w);
                vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
                p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
                vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
                m = m * m;
                return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
            }
            
            void main() {
                vec3 pos = position;
                float alpha = 1.0;
                float glow = 0.0;
                
                if (uPhase < 0.5) {
                    // GENESIS: Mouvement organique
                    vec3 noisePos = pos * 0.3 + uTime * 0.0003;
                    float n1 = snoise(noisePos);
                    float n2 = snoise(noisePos + vec3(100.0));
                    float n3 = snoise(noisePos + vec3(200.0));
                    vec3 curl = vec3(n1, n2, n3) * 0.5;
                    pos += curl;
                    alpha = smoothstep(0.0, 1.0, uProgress);
                    glow = 0.2;
                    
                } else if (uPhase < 1.5) {
                    // CONVERGING: Attraction vers hexagone
                    float easeProgress = uProgress * uProgress * (3.0 - 2.0 * uProgress);
                    pos = mix(position, targetPos, easeProgress);
                    float turbulence = (1.0 - easeProgress) * 0.3;
                    pos += vec3(snoise(vec3(particleIndex * 0.1, uTime * 0.001, 0.0)), snoise(vec3(particleIndex * 0.1, uTime * 0.001, 100.0)), 0.0) * turbulence;
                    alpha = 1.0;
                    glow = mix(0.3, 0.6, easeProgress);
                    
                } else if (uPhase < 2.5) {
                    // FORMED: Hexagone vivant
                    pos = targetPos;
                    float wave = sin(uTime * 0.002 * 2.0 + particleIndex * 0.1) * 0.015;
                    vec3 radialDir = normalize(targetPos);
                    pos += radialDir * wave;
                    float pulse = sin(uTime * 0.003 + particleIndex * 0.05) * 0.5 + 0.5;
                    glow = 0.5 + pulse * 0.3;
                    alpha = 0.9 + pulse * 0.1;
                    
                } else if (uPhase < 3.5) {
                    // LOADING: Onde de chargement
                    pos = targetPos;
                    float loadingWave = sin(uTime * 0.004 - particleIndex * 0.08) * 0.5 + 0.5;
                    loadingWave = pow(loadingWave, 3.0);
                    glow = 0.4 + loadingWave * 0.6 * (uProgress / 100.0);
                    alpha = 0.8 + loadingWave * 0.2;
                    vec3 radialDir = normalize(targetPos);
                    float breathe = sin(uTime * 0.002) * 0.01;
                    pos += radialDir * breathe;
                    
                } else {
                    // EXPANDING: Désintégration
                    vec3 radialDir = normalize(targetPos);
                    float expandSpeed = (uPhase - 3.5) * 8.0;
                    pos = targetPos + radialDir * expandSpeed;
                    alpha = max(0.0, 1.0 - (uPhase - 3.5) * 2.0);
                    glow = max(0.0, 0.8 - (uPhase - 3.5) * 1.5);
                }
                
                vAlpha = alpha;
                vGlow = glow;
                
                vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                gl_Position = projectionMatrix * mvPosition;
                    gl_PointSize = (5.0 / -mvPosition.z) * (1.0 + vGlow * 3.0);
            }
        `;

        // Fragment Shader
        const fragmentShader = `
            uniform vec3 uColor;
            varying float vAlpha;
            varying float vGlow;
            
            void main() {
                vec2 center = gl_PointCoord - vec2(0.5);
                float dist = length(center);
                float circle = 1.0 - smoothstep(0.0, 0.5, dist);
                float glow = 1.0 - smoothstep(0.0, 1.0, dist);
                float finalAlpha = (circle + glow * vGlow * 0.5) * vAlpha;
                vec3 finalColor = uColor * (1.0 + vGlow * 0.5);
                gl_FragColor = vec4(finalColor, finalAlpha);
            }
        `;

        // Créer hexagone
        const hexRadius = 4;
        const hexPoints = [];
        for (let i = 0; i < 6; i++) {
            const angle = (Math.PI / 3) * i - Math.PI / 2;
            hexPoints.push(new THREE.Vector3(Math.cos(angle) * hexRadius, Math.sin(angle) * hexRadius, 0));
        }

        // Créer particules
        const particlesPerSide = 40;
        const particleCount = particlesPerSide * 6;
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);
        const particleIndices = new Float32Array(particleCount);

        let idx = 0;
        for (let i = 0; i < 6; i++) {
            const p1 = hexPoints[i];
            const p2 = hexPoints[(i + 1) % 6];
            for (let j = 0; j < particlesPerSide; j++) {
                const t = j / particlesPerSide;
                const target = new THREE.Vector3().lerpVectors(p1, p2, t);
                const angle = Math.random() * Math.PI * 2;
                const distance = 15 + Math.random() * 20;
                const height = (Math.random() - 0.5) * 10;
                positions[idx * 3] = Math.cos(angle) * distance;
                positions[idx * 3 + 1] = Math.sin(angle) * distance;
                positions[idx * 3 + 2] = height;
                targetPositions[idx * 3] = target.x;
                targetPositions[idx * 3 + 1] = target.y;
                targetPositions[idx * 3 + 2] = target.z;
                particleIndices[idx] = idx;
                idx++;
            }
        }

        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('targetPos', new THREE.BufferAttribute(targetPositions, 3));
        geometry.setAttribute('particleIndex', new THREE.BufferAttribute(particleIndices, 1));

        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uPhase: { value: 0 },
                uProgress: { value: 0 },
                uColor: { value: new THREE.Color(0x00f5ff) }
            },
            vertexShader,
            fragmentShader,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // Hexagone wireframe
        const hexGeometry = new THREE.BufferGeometry().setFromPoints([...hexPoints, hexPoints[0]]);
        const hexMaterial = new THREE.LineBasicMaterial({ color: 0x00f5ff, transparent: true, opacity: 0 });
        const hexLine = new THREE.Line(hexGeometry, hexMaterial);
        scene.add(hexLine);

        // Animation
        const startTime = Date.now();
        let loadingProgress = 0;
        let lastTime = Date.now();
        let frameCount = 0;
        let fps = 60;

        function animate() {
            const now = Date.now();
            const elapsed = (now - startTime) / 1000;
            
            // FPS counter
            frameCount++;
            if (now - lastTime > 1000) {
                fps = frameCount;
                frameCount = 0;
                lastTime = now;
                document.getElementById('fps').textContent = fps;
            }

            let phase = 0;
            let progress = 0;
            let phaseName = 'Genesis';

            if (elapsed < 1.5) {
                phase = 0;
                progress = Math.min(elapsed / 1.5, 1);
                phaseName = 'Genesis';
            } else if (elapsed < 4.0) {
                phase = 1;
                progress = Math.min((elapsed - 1.5) / 2.5, 1);
                phaseName = 'Converging';
            } else if (elapsed < 5.0) {
                phase = 2;
                phaseName = 'Formed';
                hexMaterial.opacity = Math.min((elapsed - 4.0) / 0.5, 0.4);
            } else if (elapsed < 8.0) {
                phase = 3;
                phaseName = 'Loading';
                loadingProgress = Math.min(((elapsed - 5.0) / 3.0) * 100, 100);
                progress = loadingProgress;
                hexMaterial.opacity = 0.3 + Math.sin(elapsed * 2) * 0.1;
            } else if (elapsed < 9.5) {
                phase = 4 + (elapsed - 8.0) / 1.5;
                phaseName = 'Expanding';
                hexMaterial.opacity = Math.max(0, 0.4 - (elapsed - 8.0) * 0.3);
                camera.position.z = 15 - (elapsed - 8.0) * 8;
            } else {
                document.getElementById('home').classList.add('show');
                document.getElementById('info').style.display = 'none';
                return;
            }

            document.getElementById('phase-name').textContent = phaseName;

            material.uniforms.uTime.value = now;
            material.uniforms.uPhase.value = phase;
            material.uniforms.uProgress.value = progress;

            // Parallax caméra
            if (phase < 4) {
                camera.position.x = Math.sin(elapsed * 0.2) * 0.3;
                camera.position.y = Math.cos(elapsed * 0.15) * 0.2;
                camera.lookAt(0, 0, 0);
            }

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
